<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills</title>
  <style>
    :root{--bg:#F7F5F0;--surface:#FFF;--surface-alt:#FBFAF7;--text:#26262B;--text-secondary:#55555F;--text-muted:#8A8A95;--border:#E4E0D8;--border-strong:#D2CDC2;--accent:#2F6FB0;--accent-hover:#245A92;--success:#1F7A4D;--shadow:0 1px 3px rgba(30,30,40,.06),0 4px 12px rgba(30,30,40,.05);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:var(--shadow);}
    .back-btn{display:flex;align-items:center;gap:5px;text-decoration:none;color:var(--text-muted);font-size:12px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);}
    .header-logo{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;}
    .header-title{font-size:15px;font-weight:700;}
    .header-sub{font-size:12px;color:var(--text-muted);}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
    .search-input{width:240px;padding:6px 12px;border:1px solid var(--border-strong);border-radius:7px;font-size:13px;color:var(--text);background:var(--bg);outline:none;}
    .search-input:focus{border-color:var(--accent);}

    .app-body{display:flex;flex:1;overflow:hidden;}

    /* Sidebar */
    aside{width:180px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:10px 8px;}
    .sidebar-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);padding:4px 6px 8px;}
    .cat-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text-secondary);}
    .cat-item:hover,.cat-item.active{background:var(--bg);}
    .cat-item.active{color:var(--accent);font-weight:600;}
    .cat-count{font-size:10px;color:var(--text-muted);background:var(--bg);padding:1px 5px;border-radius:10px;}

    /* Main grid */
    .grid-panel{flex:1;overflow-y:auto;padding:18px 20px;}
    .grid-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .grid-title{font-size:13px;font-weight:600;color:var(--text);}
    .grid-count{font-size:12px;color:var(--text-muted);}
    .skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}

    .skill-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .12s;box-shadow:var(--shadow);position:relative;}
    .skill-card:hover{border-color:var(--border-strong);transform:translateY(-1px);}
    .skill-card.selected{border-color:var(--accent);background:#f0f7ff;}
    .skill-name{font-size:13px;font-weight:700;color:var(--text);font-family:"SF Mono","Fira Code",monospace;margin-bottom:6px;}
    .skill-desc{font-size:12px;color:var(--text-secondary);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .skill-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
    .tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;}
    .tag-ecc{background:#EEF4FB;color:#1e40af;border:1px solid #BFDBFE;}
    .tag-custom{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
    .tag-version{background:var(--surface-alt);color:var(--text-muted);border:1px solid var(--border);}

    /* Detail panel */
    .detail-panel{width:420px;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;}
    .detail-panel.hidden{display:none;}
    .detail-header{padding:16px 18px;border-bottom:1px solid var(--border);}
    .detail-name{font-size:15px;font-weight:700;font-family:"SF Mono","Fira Code",monospace;color:var(--text);}
    .detail-meta{font-size:11px;color:var(--text-muted);margin-top:4px;}
    .detail-desc{font-size:13px;color:var(--text-secondary);line-height:1.65;margin-top:8px;}
    .detail-zh{font-size:12.5px;color:var(--text-secondary);margin-top:8px;padding:8px 10px;background:var(--surface-alt);border-radius:6px;border-left:3px solid var(--accent);line-height:1.6;}
    .detail-body{flex:1;overflow-y:auto;padding:16px 18px;}
    .detail-body pre{font-size:11.5px;color:var(--text-secondary);line-height:1.65;white-space:pre-wrap;font-family:"SF Mono","Fira Code",monospace;}

    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}
  </style>
</head>
<body>
<header>
  <a href="/index.html" class="back-btn">← Hub</a>
  <div class="header-logo">⚡</div>
  <div>
    <div class="header-title">Skills</div>
    <div class="header-sub" id="headerSub">加载中…</div>
  </div>
  <div class="header-right">
    <input class="search-input" id="searchInput" placeholder="搜索 Skill…" oninput="filter()">
  </div>
</header>

<div class="app-body">
  <aside>
    <div class="sidebar-label">来源</div>
    <div id="catList"></div>
  </aside>

  <div class="grid-panel">
    <div class="grid-header">
      <span class="grid-title" id="gridTitle">全部 Skills</span>
      <span class="grid-count" id="gridCount"></span>
    </div>
    <div class="skills-grid" id="skillsGrid"><div style="color:var(--text-muted);font-size:13px;padding:20px">加载中…</div></div>
  </div>

  <div class="detail-panel hidden" id="detailPanel">
    <div class="detail-header">
      <div class="detail-name" id="detailName">—</div>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-desc" id="detailDesc"></div>
      <div class="detail-zh" id="detailZh" style="display:none"></div>
    </div>
    <div class="detail-body"><pre id="detailBody"></pre></div>
  </div>
</div>

<script>
let all=[], filtered=[], selectedOrigin='all', selected=null;

const ORIGIN_LABELS={'ECC':'ECC 社区','custom':'自定义','':'自定义'};
const ORIGIN_COLORS={'ECC':'tag-ecc','custom':'tag-custom','':'tag-custom'};

async function init(){
  const r=await fetch('/api/skills');
  all=await r.json();
  document.getElementById('headerSub').textContent=`${all.length} Skills · ~/.claude/skills/`;
  buildCats(); filter();
}

function buildCats(){
  const counts={'all':all.length};
  all.forEach(s=>{const o=s.origin||'custom'; counts[o]=(counts[o]||0)+1;});
  let html=`<div class="cat-item active" data-cat="all" onclick="setCat('all')">全部 <span class="cat-count">${all.length}</span></div>`;
  Object.entries(counts).filter(([k])=>k!=='all').sort().forEach(([k,v])=>{
    html+=`<div class="cat-item" data-cat="${k}" onclick="setCat('${k}')">${ORIGIN_LABELS[k]||k} <span class="cat-count">${v}</span></div>`;
  });
  document.getElementById('catList').innerHTML=html;
}

function setCat(cat){
  selectedOrigin=cat;
  document.querySelectorAll('.cat-item').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));
  filter();
}

function filter(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  filtered=all.filter(s=>{
    const matchCat=selectedOrigin==='all'||(s.origin||'custom')===selectedOrigin;
    const matchQ=!q||s.id.toLowerCase().includes(q)||s.name.toLowerCase().includes(q)||(s.description||'').toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  document.getElementById('gridTitle').textContent=selectedOrigin==='all'?'全部 Skills':(ORIGIN_LABELS[selectedOrigin]||selectedOrigin);
  document.getElementById('gridCount').textContent=`${filtered.length} 个`;
  document.getElementById('skillsGrid').innerHTML=filtered.map(s=>`
    <div class="skill-card${selected?.id===s.id?' selected':''}" onclick="selectSkill('${esc(s.id)}')">
      <div class="skill-name">${esc(s.id)}</div>
      <div class="skill-desc">${esc(s.descriptionZh || s.description || '')}</div>
      <div class="skill-tags">
        <span class="tag ${ORIGIN_COLORS[s.origin]||'tag-custom'}">${s.origin||'custom'}</span>
        ${s.version?`<span class="tag tag-version">v${esc(s.version)}</span>`:''}
      </div>
    </div>`).join('');
}

function selectSkill(id){
  selected=all.find(s=>s.id===id);
  if(!selected)return;
  document.querySelectorAll('.skill-card').forEach(el=>{
    el.classList.toggle('selected',el.querySelector('.skill-name')?.textContent===id);
  });
  const panel=document.getElementById('detailPanel');
  panel.classList.remove('hidden');
  document.getElementById('detailName').textContent=selected.id;
  document.getElementById('detailMeta').textContent=`来源: ${selected.origin||'custom'}${selected.version?' · v'+selected.version:''}`;
  document.getElementById('detailDesc').textContent=selected.description||'';
  const zhEl=document.getElementById('detailZh');
  if(selected.descriptionZh){zhEl.textContent='🇨🇳 '+selected.descriptionZh;zhEl.style.display='block';}
  else{zhEl.style.display='none';}
  document.getElementById('detailBody').textContent=selected.content||'';
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script>
</body>
</html>
